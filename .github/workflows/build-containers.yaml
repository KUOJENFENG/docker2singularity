name: Build & Deploy Docker Containers
on:
  push:
    branches: [ main ]
  workflow_dispatch:   # allows manual "Run workflow" in Actions tab

jobs:
  deploy-images:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # Just build primary Dockerfile, tag, arm and amd64 for now
      matrix:
        dockerfile: [[Dockerfile, linux/amd64, '']]

    name: Build ${{ matrix.dockerfile[0] }}
    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Set Container Tag
      run: |
        branch=$(echo ${GITHUB_REF##*/})
        printf "Branch is ${branch}\n"
        tagged="quay.io/singularity/docker2singularity:${branch}${{ matrix.dockerfile[2] }}"
        if [[ "${branch}" == "master" ]]; then
            container="quay.io/singularity/docker2singularity:latest${{ matrix.dockerfile[2] }}"
        else
            container=${tagged}
        fi
        echo "container=${container}" >> $GITHUB_ENV
        echo "branch=${branch}" >> $GITHUB_ENV
        echo "tagged=${tagged}" >> $GITHUB_ENV

    - name: Log in to Quay Container Registry
      if: github.event_name == 'push'
      uses: docker/login-action@v2
      with:
        registry: quay.io
        username: ${{ secrets.DOCKER_USER }}
        password: ${{ secrets.DOCKER_PASS }}

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Inspect Container Names
      run: |
        printf "Tagged: ${tagged}\n"        
        printf "Container: ${container}\n"  

    - name: Build
      uses: docker/build-push-action@v3
      if: github.event_name != 'push'
      with:
        file: ${{matrix.dockerfile[0]}}
        platforms: ${{ matrix.dockerfile[1] }}
        push: false
        tags: |
          ${{ env.container }}
          ${{ env.tagged }}

    - name: Build & Deploy
      uses: docker/build-push-action@v3
      if: github.event_name == 'push'
      with:
        file: ${{matrix.dockerfile[0]}}
        platforms: ${{ matrix.dockerfile[1] }}
        push: true
        tags: |
          ${{ env.container }}
          ${{ env.tagged }}
          # ---- NEW: generate a .sif file using the freshly built docker2singularity image ----
    
    - name: Load Docker image from tar
      run: |
        TAR_PATH="Team_UZH_2025_topbrain_segmentation_ct_mr.tar"

        if [ ! -f "$TAR_PATH" ]; then
          echo "Tar file not found at $TAR_PATH"
          ls -l
          exit 1
        fi

        echo "Loading image from $TAR_PATH"
        # Capture the 'Loaded image: repo:tag' line and extract the repo:tag
        IMAGE=$(docker load -i "$TAR_PATH" | awk '/Loaded image:/ {print $3}')

        if [ -z "$IMAGE" ]; then
          echo "Could not parse image name from docker load output"
          echo "Current images:"
          docker images
          exit 1
        fi

        echo "Source image from tar: $IMAGE"
        echo "SOURCE_IMAGE=$IMAGE" >> $GITHUB_ENV
        
    - name: Generate Singularity .sif from test Docker image
      run: |
        mkdir -p sif-output

        # Example source image to convert; change if you want another base image
        SOURCE_IMAGE="ubuntu:22.04"

        echo "Converting Docker image ${SOURCE_IMAGE} to Singularity .sif using ${container}"

        docker run -v /var/run/docker.sock:/var/run/docker.sock \
                   -v "${GITHUB_WORKSPACE}/sif-output:/output" \
                   --privileged -t --rm \
                   "${container}" \
                   "${SOURCE_IMAGE}"

        echo "Contents of sif-output/:"
        ls -l sif-output

    - name: Upload .sif image as artifact
      uses: actions/upload-artifact@v4
      with:
        name: singularity-sif
        path: sif-output/*.sif
